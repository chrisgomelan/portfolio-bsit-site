[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# API redirects — must come before the SPA catch-all
[[redirects]]
  from = "/api/send-email"
  to = "/.netlify/functions/send-email"
  status = 200

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

# SPA redirect — sends all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
